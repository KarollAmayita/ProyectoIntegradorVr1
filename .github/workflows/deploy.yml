name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 149.130.163.194
          username: opc
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ProyectoIntegradorVr1
            git fetch origin
            git reset --hard origin/main
            docker compose build --no-cache
            docker compose up -d
