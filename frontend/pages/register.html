<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Multipais - Registro</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
    </div>
    
    <div class="container">
        <div class="card">
            <div class="logo-section">
                <h1>CMS Multipais</h1>
                <p>Crea tu cuenta</p>
            </div>
            
            <form id="registerForm">
                <h2>Crear Cuenta</h2>
                <p class="subtitle">Completa tus datos para registrarte</p>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Nombre" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="apellido">Apellido</label>
                        <input type="text" id="apellido" name="apellido" placeholder="Apellido" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="email">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M2 4L8 9L14 4V14H2V4ZM2 2H14V4L8 9L2 4V2Z" fill="#667eea"/>
                        </svg>
                        Email
                    </label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                </div>
                
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" placeholder="tu_usuario" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required>
                </div>
                
                <div class="form-group">
                    <label for="rol_id">Rol</label>
                    <select id="rol_id" name="rol_id" required>
                        <option value="">Selecciona un rol</option>
                        <option value="3">Editor</option>
                    </select>
                </div>
                
                <div class="form-group" id="paisGroup" style="display:none;">
                    <label for="pais_id">País</label>
                    <select id="pais_id" name="pais_id">
                        <option value="">Selecciona un país</option>
                    </select>
                </div>
                
                <button type="submit" id="registerBtn">
                    <span>Registrarme</span>
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M7 4L13 10L7 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                
                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>
            </form>
            
            <div class="links">
                <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
            </div>
        </div>
    </div>
    
    <script src="../assets/js/auth.js"></script>
</body>
</html>
