<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Multipais - Login</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
    </div>
    
    <div class="container">
        <div class="card">
            <div class="logo-section">
                <div class="logo-icon">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                        <rect width="40" height="40" rx="10" fill="url(#gradient)"/>
                        <path d="M12 20L18 26L28 14" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        <defs>
                            <linearGradient id="gradient" x1="0" y1="0" x2="40" y2="40">
                                <stop offset="0%" stop-color="#667eea"/>
                                <stop offset="100%" stop-color="#764ba2"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1>CMS Multipais</h1>
                <p>Gestión de contenidos multi-país</p>
            </div>
            
            <form id="loginForm">
                <h2>Bienvenido de nuevo</h2>
                <p class="subtitle">Ingresa tus credenciales para continuar</p>
                
                <div class="form-group">
                    <label for="username">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M8 8C10.21 8 12 6.21 12 4C12 1.79 10.21 0 8 0C5.79 0 4 1.79 4 4C4 6.21 5.79 8 8 8ZM8 10C5.33 10 0 11.34 0 14V16H16V14C16 11.34 10.67 10 8 10Z" fill="#667eea"/>
                        </svg>
                        Usuario
                    </label>
                    <input type="text" id="username" name="username" placeholder="Ingresa tu usuario" required>
                </div>
                
                <div class="form-group">
                    <label for="password">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M8 0C5.51 0 3.5 2.01 3.5 4.5V6C2.67 6 2 6.67 2 7.5V14C2 14.83 2.67 15.5 3.5 15.5H12.5C13.33 15.5 14 14.83 14 14V7.5C14 6.67 13.33 6 12.5 6V4.5C12.5 2.01 10.49 0 8 0ZM8 1.5C9.71 1.5 11 2.79 11 4.5V6H5V4.5C5 2.79 6.29 1.5 8 1.5ZM5.5 7.5H10.5V6H5.5V7.5Z" fill="#667eea"/>
                        </svg>
                        Contraseña
                    </label>
                    <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
                </div>
                
                <button type="submit" id="loginBtn">
                    <span>Ingresar</span>
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M7 4L13 10L7 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                
                <div id="errorMessage" class="error-message"></div>
            </form>
            
            <div class="links">
                <p>¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
            </div>
        </div>
    </div>
    
    <script src="../assets/js/auth.js"></script>
</body>
</html>
