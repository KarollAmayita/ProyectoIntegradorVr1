<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Argentina Comparte - Noticias</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin-styles.css" />
</head>
<body>

  <div id="zona-sidebar"></div>

  <main class="contenido-principal">
    <div id="zona-topbar"></div>

    <section class="panel-contenido">

      <div class="panel-contenido__cabecera">
        <h2 class="panel-contenido__titulo">Gesti\u00f3n de noticias</h2>
        <button class="boton boton--principal" id="boton-nueva-noticia">
          <i class="bi bi-plus-circle"></i>
          Nueva noticia
        </button>
      </div>

      <div class="barra-filtros">
        <input type="text" id="filtro-busqueda" placeholder="Buscar por t\u00edtulo..." />
        <select id="filtro-estado">
          <option value="">Todos los estados</option>
          <option value="borrador">Borrador</option>
          <option value="publicado">Publicado</option>
          <option value="despublicado">Despublicado</option>
        </select>
      </div>

      <div class="tabla-contenedor">
        <table class="tabla">
          <thead>
            <tr>
              <th>Imagen</th>
              <th>T\u00edtulo</th>
              <th>Pa\u00eds</th>
              <th>Autor</th>
              <th>Estado</th>
              <th>Creada</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-noticias">
            <tr><td colspan="7" class="tabla__sin-datos">Cargando noticias...</td></tr>
          </tbody>
        </table>
      </div>

    </section>
  </main>

  <!-- ============================================================
       MODAL: crear o editar noticia
       ============================================================ -->
  <div class="fondo-modal" id="modal-noticia">
    <div class="modal modal--ancho">
      <div class="modal__cabecera">
        <h3 class="modal__titulo" id="modal-noticia-titulo">Nueva noticia</h3>
        <button class="modal__cerrar" onclick="cerrarModal('modal-noticia')">&times;</button>
      </div>

      <form id="formulario-noticia">
        <div class="modal__cuerpo">

          <input type="hidden" id="noticia-id" />

          <div class="campo-formulario">
            <label for="noticia-titulo">T\u00edtulo *</label>
            <input type="text" id="noticia-titulo" required />
          </div>

          <div class="campo-formulario" id="contenedor-pais-noticia">
            <label for="noticia-pais">Pa\u00eds *</label>
            <select id="noticia-pais"></select>
          </div>

          <div class="campo-formulario">
            <label for="noticia-resumen">Resumen *</label>
            <textarea id="noticia-resumen" rows="2" required></textarea>
          </div>

          <div class="campo-formulario">
            <label for="noticia-contenido">Contenido completo *</label>
            <textarea id="noticia-contenido" rows="6" required></textarea>
          </div>

          <div class="campo-formulario">
            <label for="noticia-imagen">URL de la imagen principal</label>
            <input type="url" id="noticia-imagen" placeholder="https://..." />
          </div>

          <div class="campo-formulario">
            <label for="noticia-estado">Estado *</label>
            <select id="noticia-estado" required>
              <option value="borrador">Borrador</option>
              <option value="publicado">Publicado</option>
              <option value="despublicado">Despublicado</option>
            </select>
          </div>

          <div id="mensaje-error-noticia" class="mensaje mensaje--error" hidden></div>
        </div>

        <div class="modal__pie">
          <button type="button" class="boton boton--secundario" onclick="cerrarModal('modal-noticia')">Cancelar</button>
          <button type="submit" class="boton boton--principal" id="boton-guardar-noticia">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal de confirmaci\u00f3n para eliminar -->
  <div class="fondo-modal" id="modal-confirmar-eliminar">
    <div class="modal">
      <div class="modal__cuerpo">
        <div class="confirmacion">
          <i class="bi bi-exclamation-triangle confirmacion__icono"></i>
          <p class="confirmacion__pregunta">\u00bfElimin\u00e1s esta noticia?</p>
          <p class="confirmacion__texto" id="texto-confirmar-eliminar">Esta acci\u00f3n no se puede deshacer.</p>
        </div>
      </div>
      <div class="modal__pie">
        <button class="boton boton--secundario" onclick="cerrarModal('modal-confirmar-eliminar')">Cancelar</button>
        <button class="boton boton--peligro" id="boton-confirmar-eliminar">S\u00ed, eliminar</button>
      </div>
    </div>
  </div>

  <script src="admin-shared.js"></script>
  <script>
    exigirSesion();
    pintarSidebar('noticias');
    pintarTopbar('Noticias');

    // Variables de estado
    let noticias = [];
    let paisesActivos = [];
    let idNoticiaAEliminar = null;

    // Referencias del DOM
    const tabla = document.getElementById('tabla-noticias');
    const filtroBusqueda = document.getElementById('filtro-busqueda');
    const filtroEstado = document.getElementById('filtro-estado');
    const formulario = document.getElementById('formulario-noticia');
    const cajaError = document.getElementById('mensaje-error-noticia');
    const botonGuardar = document.getElementById('boton-guardar-noticia');

    /* ----------------------------------------------------------
       CARGAR datos del backend
       ---------------------------------------------------------- */
    async function cargarNoticias() {
      try {
        noticias = await llamarApi('/news');
        pintarTabla();
      } catch (error) {
        tabla.innerHTML = `<tr><td colspan="7" class="tabla__sin-datos">Error: ${error.message}</td></tr>`;
      }
    }

    async function cargarPaises() {
      try {
        paisesActivos = await llamarApi('/countries/active');

        const selectorPais = document.getElementById('noticia-pais');
        selectorPais.innerHTML = '<option value="">Seleccion\u00e1 un pa\u00eds</option>' +
          paisesActivos.map(pais => `<option value="${pais.id}">${pais.nombre}</option>`).join('');

        // El selector de pa\u00eds solo se muestra para superadmin
        if (!usuarioEs('superadmin')) {
          document.getElementById('contenedor-pais-noticia').style.display = 'none';
        }
      } catch (error) {
        console.error('Error cargando pa\u00edses:', error);
      }
    }

    /* ----------------------------------------------------------
       PINTAR la tabla aplicando filtros
       ---------------------------------------------------------- */
    function pintarTabla() {
      const textoBusqueda = filtroBusqueda.value.toLowerCase();
      const estadoFiltro = filtroEstado.value;

      const noticiasFiltradas = noticias.filter(noticia => {
        const coincideTexto = !textoBusqueda || noticia.titulo.toLowerCase().includes(textoBusqueda);
        const coincideEstado = !estadoFiltro || noticia.estado === estadoFiltro;
        return coincideTexto && coincideEstado;
      });

      if (noticiasFiltradas.length === 0) {
        tabla.innerHTML = `<tr><td colspan="7" class="tabla__sin-datos">No hay noticias para mostrar.</td></tr>`;
        return;
      }

      tabla.innerHTML = noticiasFiltradas.map(noticia => {
        const imagen = noticia.imagen_principal_url
          ? `<img class="tabla__miniatura" src="${noticia.imagen_principal_url}" alt="" />`
          : `<div class="tabla__miniatura" style="display:flex;align-items:center;justify-content:center;color:#5A6C84;"><i class="bi bi-image"></i></div>`;

        const autor = noticia.usuarios
          ? `${noticia.usuarios.nombre} ${noticia.usuarios.apellido}`
          : '\u2014';

        const pais = noticia.paises?.nombre || '\u2014';

        // Solo superadmin y admin_pais pueden eliminar (los editores no)
        const botonEliminar = usuarioEs('superadmin', 'admin_pais')
          ? `<button class="boton-icono-fila boton-icono-fila--peligro" onclick="confirmarEliminar(${noticia.id}, '${noticia.titulo.replace(/'/g, "\\'")}')" title="Eliminar"><i class="bi bi-trash"></i></button>`
          : '';

        return `
          <tr>
            <td>${imagen}</td>
            <td><strong>${noticia.titulo}</strong></td>
            <td>${pais}</td>
            <td>${autor}</td>
            <td><span class="etiqueta-estado etiqueta-estado--${noticia.estado}">${noticia.estado}</span></td>
            <td>${formatearFecha(noticia.created_at)}</td>
            <td>
              <div class="acciones-fila">
                <button class="boton-icono-fila" onclick="abrirEdicion(${noticia.id})" title="Editar"><i class="bi bi-pencil"></i></button>
                ${botonEliminar}
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    filtroBusqueda.addEventListener('input', pintarTabla);
    filtroEstado.addEventListener('change', pintarTabla);

    /* ----------------------------------------------------------
       ABRIR modal en modo "nueva" o "editar"
       ---------------------------------------------------------- */
    document.getElementById('boton-nueva-noticia').addEventListener('click', () => {
      formulario.reset();
      document.getElementById('noticia-id').value = '';
      document.getElementById('modal-noticia-titulo').textContent = 'Nueva noticia';
      cajaError.hidden = true;
      abrirModal('modal-noticia');
    });

    function abrirEdicion(idNoticia) {
      const noticia = noticias.find(n => n.id === idNoticia);
      if (!noticia) return;

      document.getElementById('noticia-id').value = noticia.id;
      document.getElementById('noticia-titulo').value = noticia.titulo;
      document.getElementById('noticia-resumen').value = noticia.resumen;
      document.getElementById('noticia-contenido').value = noticia.contenido || '';
      document.getElementById('noticia-imagen').value = noticia.imagen_principal_url || '';
      document.getElementById('noticia-estado').value = noticia.estado;

      if (noticia.paises?.id) {
        document.getElementById('noticia-pais').value = noticia.paises.id;
      }

      document.getElementById('modal-noticia-titulo').textContent = 'Editar noticia';
      cajaError.hidden = true;
      abrirModal('modal-noticia');
    }

    /* ----------------------------------------------------------
       GUARDAR (crear o actualizar) la noticia
       ---------------------------------------------------------- */
    formulario.addEventListener('submit', async (evento) => {
      evento.preventDefault();
      cajaError.hidden = true;

      const idNoticia = document.getElementById('noticia-id').value;

      // Construir el objeto que se manda al backend
      const datos = {
        titulo: document.getElementById('noticia-titulo').value.trim(),
        resumen: document.getElementById('noticia-resumen').value.trim(),
        contenido: document.getElementById('noticia-contenido').value.trim(),
        imagen_principal_url: document.getElementById('noticia-imagen').value.trim() || null,
        estado: document.getElementById('noticia-estado').value
      };

      // El pais_id solo se envia si es superadmin (los demas roles lo asigna el backend)
      if (usuarioEs('superadmin')) {
        const paisId = document.getElementById('noticia-pais').value;
        if (paisId) datos.pais_id = Number(paisId);
      }

      botonGuardar.disabled = true;

      try {
        if (idNoticia) {
          await llamarApi(`/news/${idNoticia}`, { method: 'PUT', body: datos });
        } else {
          await llamarApi('/news', { method: 'POST', body: datos });
        }
        cerrarModal('modal-noticia');
        await cargarNoticias();
      } catch (error) {
        cajaError.textContent = error.message;
        cajaError.hidden = false;
      } finally {
        botonGuardar.disabled = false;
      }
    });

    /* ----------------------------------------------------------
       ELIMINAR noticia (con confirmaci\u00f3n)
       ---------------------------------------------------------- */
    function confirmarEliminar(idNoticia, tituloNoticia) {
      idNoticiaAEliminar = idNoticia;
      document.getElementById('texto-confirmar-eliminar').textContent =
        `La noticia "${tituloNoticia}" se eliminar\u00e1 definitivamente.`;
      abrirModal('modal-confirmar-eliminar');
    }

    document.getElementById('boton-confirmar-eliminar').addEventListener('click', async () => {
      if (!idNoticiaAEliminar) return;
      try {
        await llamarApi(`/news/${idNoticiaAEliminar}`, { method: 'DELETE' });
        cerrarModal('modal-confirmar-eliminar');
        idNoticiaAEliminar = null;
        await cargarNoticias();
      } catch (error) {
        alert('No se pudo eliminar: ' + error.message);
      }
    });

    // Arranque inicial
    cargarPaises();
    cargarNoticias();
  </script>
</body>
</html>
