<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bitácora de auditoría</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin-styles.css" />
  <script src="tema-inmediato.js"></script></head>
<body>
  <div id="zona-sidebar"></div>
  <main class="contenido-principal">
    <div id="zona-topbar"></div>

    <section class="panel-contenido">
      <div class="panel-contenido__cabecera">
        <h2 class="panel-contenido__titulo">Bitácora de auditoría</h2>
        <span style="font-size:13px; color:#5A6C84;">
          <i class="bi bi-info-circle"></i> Trazabilidad de acciones administrativas
        </span>
      </div>

      <div class="barra-filtros">
        <input type="text" id="filtro-modulo" placeholder="Filtrar por módulo..." />
        <button class="boton boton--principal" id="boton-refrescar">
          <i class="bi bi-arrow-clockwise"></i> Refrescar
        </button>
      </div>

      <div class="tabla-contenedor">
        <table class="tabla">
          <thead>
            <tr>
              <th>Usuario</th>
              <th>Acción</th>
              <th>Módulo</th>
              <th>IP</th>
              <th>Fecha</th>
            </tr>
          </thead>
          <tbody id="tabla-auditoria">
            <tr><td colspan="5" class="tabla__sin-datos">Cargando bitácora...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="admin-shared.js"></script>
  <script>
    if (!exigirRol('superadmin', 'admin_pais')) throw new Error('Sin permiso');

    pintarSidebar('auditoria');
    pintarTopbar('Auditoría');

    const tabla = document.getElementById('tabla-auditoria');
    const filtroModulo = document.getElementById('filtro-modulo');

    async function cargarAuditoria() {
      try {
        const modulo = filtroModulo.value.trim();
        const url = modulo ? `/auditoria?limit=50&modulo=${encodeURIComponent(modulo)}` : '/auditoria?limit=50';
        const res = await llamarApi(url);
        const logs = normalizarListaApi(res);

        if (logs.length === 0) {
          tabla.innerHTML = '<tr><td colspan="5" class="tabla__sin-datos">No hay registros en la bitácora.</td></tr>';
          return;
        }

        tabla.innerHTML = logs.map((log) => `
          <tr>
            <td><strong>${log.username || '—'}</strong></td>
            <td>${log.accion}</td>
            <td>${log.modulo}</td>
            <td>${log.ip_address || log.ip || '—'}</td>
            <td>${formatearFecha(log.created_at, true)}</td>
          </tr>
        `).join('');
      } catch (error) {
        tabla.innerHTML = `<tr><td colspan="5" class="tabla__sin-datos">Error: ${error.message}</td></tr>`;
      }
    }

    filtroModulo.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') cargarAuditoria();
    });
    document.getElementById('boton-refrescar').addEventListener('click', cargarAuditoria);
    cargarAuditoria();
  </script>
</body>
</html>
