<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Argentina Comparte - Testimonios</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin-styles.css" />
</head>
<body>

  <div id="zona-sidebar"></div>

  <main class="contenido-principal">
    <div id="zona-topbar"></div>

    <section class="panel-contenido">

      <div class="panel-contenido__cabecera">
        <h2 class="panel-contenido__titulo">Gesti\u00f3n de testimonios</h2>
        <button class="boton boton--principal" id="boton-nuevo-testimonio">
          <i class="bi bi-plus-circle"></i>
          Nuevo testimonio
        </button>
      </div>

      <div class="barra-filtros">
        <input type="text" id="filtro-busqueda" placeholder="Buscar por nombre..." />
        <select id="filtro-estado">
          <option value="">Todos los estados</option>
          <option value="borrador">Borrador</option>
          <option value="publicado">Publicado</option>
          <option value="despublicado">Despublicado</option>
        </select>
      </div>

      <div class="tabla-contenedor">
        <table class="tabla">
          <thead>
            <tr>
              <th>Foto</th>
              <th>Nombre</th>
              <th>Cargo / Empresa</th>
              <th>Pa\u00eds</th>
              <th>Estado</th>
              <th>Destacado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-testimonios">
            <tr><td colspan="7" class="tabla__sin-datos">Cargando testimonios...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- ============================================================
       MODAL: crear o editar testimonio
       ============================================================ -->
  <div class="fondo-modal" id="modal-testimonio">
    <div class="modal modal--ancho">
      <div class="modal__cabecera">
        <h3 class="modal__titulo" id="modal-testimonio-titulo">Nuevo testimonio</h3>
        <button class="modal__cerrar" onclick="cerrarModal('modal-testimonio')">&times;</button>
      </div>

      <form id="formulario-testimonio">
        <div class="modal__cuerpo">

          <input type="hidden" id="testimonio-id" />

          <div class="campos-en-fila">
            <div class="campo-formulario">
              <label for="testimonio-nombre">Nombre *</label>
              <input type="text" id="testimonio-nombre" required />
            </div>
            <div class="campo-formulario" id="contenedor-pais-testimonio">
              <label for="testimonio-pais">Pa\u00eds *</label>
              <select id="testimonio-pais"></select>
            </div>
          </div>

          <div class="campos-en-fila">
            <div class="campo-formulario">
              <label for="testimonio-cargo">Cargo</label>
              <input type="text" id="testimonio-cargo" />
            </div>
            <div class="campo-formulario">
              <label for="testimonio-empresa">Empresa</label>
              <input type="text" id="testimonio-empresa" />
            </div>
          </div>

          <div class="campo-formulario">
            <label for="testimonio-contenido">Contenido del testimonio *</label>
            <textarea id="testimonio-contenido" rows="4" required></textarea>
          </div>

          <div class="campo-formulario">
            <label for="testimonio-foto">URL de la foto *</label>
            <input type="url" id="testimonio-foto" placeholder="https://..." required />
          </div>

          <div class="campos-en-fila">
            <div class="campo-formulario">
              <label for="testimonio-instagram">Instagram</label>
              <input type="url" id="testimonio-instagram" placeholder="https://instagram.com/..." />
            </div>
            <div class="campo-formulario">
              <label for="testimonio-facebook">Facebook</label>
              <input type="url" id="testimonio-facebook" placeholder="https://facebook.com/..." />
            </div>
          </div>

          <div class="campos-en-fila">
            <div class="campo-formulario">
              <label for="testimonio-estado">Estado *</label>
              <select id="testimonio-estado" required>
                <option value="borrador">Borrador</option>
                <option value="publicado">Publicado</option>
                <option value="despublicado">Despublicado</option>
              </select>
            </div>
            <div class="campo-formulario">
              <label for="testimonio-destacado">\u00bfDestacado?</label>
              <select id="testimonio-destacado">
                <option value="false">No</option>
                <option value="true">S\u00ed</option>
              </select>
            </div>
          </div>

          <div id="mensaje-error-testimonio" class="mensaje mensaje--error" hidden></div>
        </div>

        <div class="modal__pie">
          <button type="button" class="boton boton--secundario" onclick="cerrarModal('modal-testimonio')">Cancelar</button>
          <button type="submit" class="boton boton--principal" id="boton-guardar-testimonio">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal de confirmaci\u00f3n para eliminar -->
  <div class="fondo-modal" id="modal-confirmar-eliminar">
    <div class="modal">
      <div class="modal__cuerpo">
        <div class="confirmacion">
          <i class="bi bi-exclamation-triangle confirmacion__icono"></i>
          <p class="confirmacion__pregunta">\u00bfElimin\u00e1s este testimonio?</p>
          <p class="confirmacion__texto" id="texto-confirmar-eliminar">Esta acci\u00f3n no se puede deshacer.</p>
        </div>
      </div>
      <div class="modal__pie">
        <button class="boton boton--secundario" onclick="cerrarModal('modal-confirmar-eliminar')">Cancelar</button>
        <button class="boton boton--peligro" id="boton-confirmar-eliminar">S\u00ed, eliminar</button>
      </div>
    </div>
  </div>

  <script src="admin-shared.js"></script>
  <script>
    exigirSesion();
    pintarSidebar('testimonios');
    pintarTopbar('Testimonios');

    let testimonios = [];
    let paisesActivos = [];
    let idTestimonioAEliminar = null;

    const tabla = document.getElementById('tabla-testimonios');
    const filtroBusqueda = document.getElementById('filtro-busqueda');
    const filtroEstado = document.getElementById('filtro-estado');
    const formulario = document.getElementById('formulario-testimonio');
    const cajaError = document.getElementById('mensaje-error-testimonio');
    const botonGuardar = document.getElementById('boton-guardar-testimonio');

    async function cargarTestimonios() {
      try {
        testimonios = await llamarApi('/testimonials');
        pintarTabla();
      } catch (error) {
        tabla.innerHTML = `<tr><td colspan="7" class="tabla__sin-datos">Error: ${error.message}</td></tr>`;
      }
    }

    async function cargarPaises() {
      try {
        paisesActivos = await llamarApi('/countries/active');
        const selectorPais = document.getElementById('testimonio-pais');
        selectorPais.innerHTML = '<option value="">Seleccion\u00e1 un pa\u00eds</option>' +
          paisesActivos.map(pais => `<option value="${pais.id}">${pais.nombre}</option>`).join('');

        if (!usuarioEs('superadmin')) {
          document.getElementById('contenedor-pais-testimonio').style.display = 'none';
        }
      } catch (error) {
        console.error('Error cargando pa\u00edses:', error);
      }
    }

    function pintarTabla() {
      const textoBusqueda = filtroBusqueda.value.toLowerCase();
      const estadoFiltro = filtroEstado.value;

      const filtrados = testimonios.filter(testimonio => {
        const coincideTexto = !textoBusqueda || testimonio.nombre.toLowerCase().includes(textoBusqueda);
        const coincideEstado = !estadoFiltro || testimonio.estado === estadoFiltro;
        return coincideTexto && coincideEstado;
      });

      if (filtrados.length === 0) {
        tabla.innerHTML = `<tr><td colspan="7" class="tabla__sin-datos">No hay testimonios para mostrar.</td></tr>`;
        return;
      }

      tabla.innerHTML = filtrados.map(testimonio => {
        const foto = testimonio.foto_url
          ? `<img class="tabla__miniatura" style="border-radius:50%;" src="${testimonio.foto_url}" alt="" />`
          : `<div class="tabla__miniatura" style="border-radius:50%;display:flex;align-items:center;justify-content:center;color:#5A6C84;"><i class="bi bi-person"></i></div>`;

        const cargoEmpresa = [testimonio.cargo, testimonio.empresa].filter(Boolean).join(' \u2022 ') || '\u2014';
        const pais = testimonio.paises?.nombre || '\u2014';
        const destacado = testimonio.destacado
          ? '<i class="bi bi-star-fill" style="color:#FCBF49;"></i>'
          : '<i class="bi bi-star" style="color:#E1E8F0;"></i>';

        const botonEliminar = usuarioEs('superadmin', 'admin_pais')
          ? `<button class="boton-icono-fila boton-icono-fila--peligro" onclick="confirmarEliminar(${testimonio.id}, '${testimonio.nombre.replace(/'/g, "\\'")}')" title="Eliminar"><i class="bi bi-trash"></i></button>`
          : '';

        return `
          <tr>
            <td>${foto}</td>
            <td><strong>${testimonio.nombre}</strong></td>
            <td>${cargoEmpresa}</td>
            <td>${pais}</td>
            <td><span class="etiqueta-estado etiqueta-estado--${testimonio.estado}">${testimonio.estado}</span></td>
            <td style="text-align:center;">${destacado}</td>
            <td>
              <div class="acciones-fila">
                <button class="boton-icono-fila" onclick="abrirEdicion(${testimonio.id})" title="Editar"><i class="bi bi-pencil"></i></button>
                ${botonEliminar}
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    filtroBusqueda.addEventListener('input', pintarTabla);
    filtroEstado.addEventListener('change', pintarTabla);

    document.getElementById('boton-nuevo-testimonio').addEventListener('click', () => {
      formulario.reset();
      document.getElementById('testimonio-id').value = '';
      document.getElementById('modal-testimonio-titulo').textContent = 'Nuevo testimonio';
      cajaError.hidden = true;
      abrirModal('modal-testimonio');
    });

    function abrirEdicion(idTestimonio) {
      const testimonio = testimonios.find(t => t.id === idTestimonio);
      if (!testimonio) return;

      document.getElementById('testimonio-id').value = testimonio.id;
      document.getElementById('testimonio-nombre').value = testimonio.nombre || '';
      document.getElementById('testimonio-cargo').value = testimonio.cargo || '';
      document.getElementById('testimonio-empresa').value = testimonio.empresa || '';
      document.getElementById('testimonio-contenido').value = testimonio.contenido || '';
      document.getElementById('testimonio-foto').value = testimonio.foto_url || '';
      document.getElementById('testimonio-instagram').value = testimonio.instagram_url || '';
      document.getElementById('testimonio-facebook').value = testimonio.facebook_url || '';
      document.getElementById('testimonio-estado').value = testimonio.estado;
      document.getElementById('testimonio-destacado').value = testimonio.destacado ? 'true' : 'false';

      if (testimonio.paises?.id) {
        document.getElementById('testimonio-pais').value = testimonio.paises.id;
      }

      document.getElementById('modal-testimonio-titulo').textContent = 'Editar testimonio';
      cajaError.hidden = true;
      abrirModal('modal-testimonio');
    }

    formulario.addEventListener('submit', async (evento) => {
      evento.preventDefault();
      cajaError.hidden = true;

      const idTestimonio = document.getElementById('testimonio-id').value;

      const datos = {
        nombre: document.getElementById('testimonio-nombre').value.trim(),
        cargo: document.getElementById('testimonio-cargo').value.trim() || null,
        empresa: document.getElementById('testimonio-empresa').value.trim() || null,
        contenido: document.getElementById('testimonio-contenido').value.trim(),
        foto_url: document.getElementById('testimonio-foto').value.trim(),
        instagram_url: document.getElementById('testimonio-instagram').value.trim() || null,
        facebook_url: document.getElementById('testimonio-facebook').value.trim() || null,
        estado: document.getElementById('testimonio-estado').value,
        destacado: document.getElementById('testimonio-destacado').value === 'true'
      };

      if (usuarioEs('superadmin')) {
        const paisId = document.getElementById('testimonio-pais').value;
        if (paisId) datos.pais_id = Number(paisId);
      }

      botonGuardar.disabled = true;

      try {
        if (idTestimonio) {
          await llamarApi(`/testimonials/${idTestimonio}`, { method: 'PUT', body: datos });
        } else {
          await llamarApi('/testimonials', { method: 'POST', body: datos });
        }
        cerrarModal('modal-testimonio');
        await cargarTestimonios();
      } catch (error) {
        cajaError.textContent = error.message;
        cajaError.hidden = false;
      } finally {
        botonGuardar.disabled = false;
      }
    });

    function confirmarEliminar(idTestimonio, nombreTestimonio) {
      idTestimonioAEliminar = idTestimonio;
      document.getElementById('texto-confirmar-eliminar').textContent =
        `El testimonio de "${nombreTestimonio}" se eliminar\u00e1 definitivamente.`;
      abrirModal('modal-confirmar-eliminar');
    }

    document.getElementById('boton-confirmar-eliminar').addEventListener('click', async () => {
      if (!idTestimonioAEliminar) return;
      try {
        await llamarApi(`/testimonials/${idTestimonioAEliminar}`, { method: 'DELETE' });
        cerrarModal('modal-confirmar-eliminar');
        idTestimonioAEliminar = null;
        await cargarTestimonios();
      } catch (error) {
        alert('No se pudo eliminar: ' + error.message);
      }
    });

    cargarPaises();
    cargarTestimonios();
  </script>
</body>
</html>
