<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Editor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin-styles.css" />
</head>
<body>
  <div id="zona-sidebar"></div>
  <main class="contenido-principal">
    <div id="zona-topbar"></div>

    <section class="grilla-estadisticas">
      <div class="tarjeta-estadistica">
        <p class="tarjeta-estadistica__etiqueta"><i class="bi bi-newspaper"></i> Mis noticias</p>
        <p class="tarjeta-estadistica__numero" id="conteo-noticias">—</p>
      </div>
      <div class="tarjeta-estadistica tarjeta-estadistica--verde">
        <p class="tarjeta-estadistica__etiqueta"><i class="bi bi-check-circle"></i> Publicadas</p>
        <p class="tarjeta-estadistica__numero" id="conteo-noticias-publicadas">—</p>
      </div>
      <div class="tarjeta-estadistica">
        <p class="tarjeta-estadistica__etiqueta"><i class="bi bi-pencil-square"></i> Borradores</p>
        <p class="tarjeta-estadistica__numero" id="conteo-noticias-borrador">—</p>
      </div>
      <div class="tarjeta-estadistica tarjeta-estadistica--amarilla">
        <p class="tarjeta-estadistica__etiqueta"><i class="bi bi-chat-quote"></i> Testimonios</p>
        <p class="tarjeta-estadistica__numero" id="conteo-testimonios">—</p>
      </div>
    </section>

    <section class="panel-contenido">
      <h2 class="panel-contenido__titulo">Hola, <span id="saludo-nombre">editor</span></h2>
      <p class="panel-contenido__texto" id="texto-bienvenida-pais">Creá y editá contenido para tu portal.</p>
    </section>

    <section class="panel-contenido">
      <h2 class="panel-contenido__titulo">Accesos rápidos</h2>
      <div class="grilla-accesos-rapidos">
        <a href="/admin/noticias" class="tarjeta-acceso">
          <i class="bi bi-newspaper"></i>
          <span>Gestionar noticias</span>
        </a>
        <a href="/admin/testimonios" class="tarjeta-acceso">
          <i class="bi bi-chat-quote"></i>
          <span>Gestionar testimonios</span>
        </a>
      </div>
    </section>
  </main>

  <script src="admin-shared.js"></script>
  <script>
    if (!exigirRol('editor')) throw new Error('Sin permiso');

    const usuario = obtenerUsuario();
    pintarSidebar('dashboard-editor');
    pintarTopbar('Dashboard Editor');
    document.getElementById('saludo-nombre').textContent = usuario?.nombre || 'editor';
    document.getElementById('texto-bienvenida-pais').textContent =
      `Editor de contenidos — ${usuario?.pais?.nombre || 'tu país'}.`;

    async function cargarResumen() {
      try {
        const [noticias, testimonios] = await Promise.all([
          llamarApi('/noticias'),
          llamarApi('/testimonios')
        ]);

        const listaNoticias = normalizarListaApi(noticias);
        const listaTestimonios = normalizarListaApi(testimonios);

        document.getElementById('conteo-noticias').textContent = listaNoticias.length;
        document.getElementById('conteo-noticias-publicadas').textContent =
          listaNoticias.filter((n) => n.estado === 'publicado').length;
        document.getElementById('conteo-noticias-borrador').textContent =
          listaNoticias.filter((n) => n.estado === 'borrador').length;
        document.getElementById('conteo-testimonios').textContent = listaTestimonios.length;
      } catch (error) {
        console.error('Error dashboard editor:', error);
      }
    }

    cargarResumen();
  </script>
</body>
</html>
