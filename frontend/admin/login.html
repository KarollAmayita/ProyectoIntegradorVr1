<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Argentina Comparte - Iniciar sesión</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin-styles.css" />
</head>
<body class="pantalla-login">

  <div class="tarjeta-login">

    <div class="tarjeta-login__encabezado">
      <h1 class="tarjeta-login__marca">
        <span class="marca-argentina">Argentina</span>
        <span class="marca-comparte">Comparte</span>
      </h1>
      <p class="tarjeta-login__subtitulo">Panel administrativo</p>
    </div>

    <h2 class="tarjeta-login__titulo">Bienvenido/a</h2>
    <p class="tarjeta-login__bienvenida">Ingresá con tus credenciales para administrar el portal.</p>

    <form id="formulario-login">

      <div class="campo-formulario">
        <label for="campo-usuario">Usuario</label>
        <input type="text" id="campo-usuario" name="username" placeholder="Tu usuario" required />
      </div>

      <div class="campo-formulario">
        <label for="campo-contrasena">Contraseña</label>
        <input type="password" id="campo-contrasena" name="password" placeholder="Tu contraseña" required />
      </div>

      <button type="submit" class="boton boton--principal boton--bloque" id="boton-ingresar">
        <i class="bi bi-box-arrow-in-right"></i>
        Ingresar
      </button>

      <div id="mensaje-error" class="mensaje mensaje--error" hidden></div>
    </form>

    <p class="enlace-recuperar">
      ¿Olvidaste tu contraseña? <a href="recuperar.html">Recuperala acá</a>
    </p>
  </div>

  <script src="admin-shared.js"></script>
  <script>
    if (obtenerToken()) {
      window.location.href = '/admin/dashboard';
    }

    const formularioLogin = document.getElementById('formulario-login');
    const cajaError = document.getElementById('mensaje-error');
    const botonIngresar = document.getElementById('boton-ingresar');

    formularioLogin.addEventListener('submit', async (evento) => {
      evento.preventDefault();
      cajaError.hidden = true;

      const usuario   = document.getElementById('campo-usuario').value.trim();
      const password  = document.getElementById('campo-contrasena').value;

      if (!usuario || !password) {
        cajaError.textContent = 'Completá usuario y contraseña.';
        cajaError.hidden = false;
        return;
      }

      botonIngresar.disabled = true;

      try {
        const respuesta = await llamarApi('/auth/login', {
          method: 'POST',
          body: { username: usuario, password: password }
        });

        // Guardamos token + refreshToken + datos del usuario
        guardarSesion(respuesta.token, respuesta.user, respuesta.refreshToken);

        window.location.href = '/admin/dashboard';
      } catch (error) {
        cajaError.textContent = error.message;
        cajaError.hidden = false;
      } finally {
        botonIngresar.disabled = false;
      }
    });
  </script>
</body>
</html>
