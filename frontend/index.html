<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CMS Multipaís - Auth</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div id="login-form" class="form-box">
      <h2>Iniciar Sesión</h2>
      <input id="login-username" type="text" placeholder="Usuario" />
      <input id="login-password" type="password" placeholder="Contraseña" />
      <button onclick="login()">Entrar</button>
      <p>¿No tienes cuenta? <a href="#" onclick="showRegister()">Regístrate</a></p>
      <pre id="login-result"></pre>
    </div>

    <div id="register-form" class="form-box hidden">
      <h2>Registro</h2>
      <input id="reg-nombre" type="text" placeholder="Nombre" />
      <input id="reg-apellido" type="text" placeholder="Apellido" />
      <input id="reg-email" type="email" placeholder="Email" />
      <input id="reg-username" type="text" placeholder="Usuario" />
      <input id="reg-password" type="password" placeholder="Contraseña" />
      <input id="reg-rol" type="number" placeholder="Rol ID (1=superadmin,2=admin,3=editor)" />
      <input id="reg-pais" type="number" placeholder="País ID (1=CO,2=CL,3=EC)" />
      <button onclick="register()">Registrarse</button>
      <p>¿Ya tienes cuenta? <a href="#" onclick="showLogin()">Inicia sesión</a></p>
      <pre id="register-result"></pre>
    </div>

    <div id="dashboard" class="form-box hidden">
      <h2>Bienvenido</h2>
      <p id="user-info"></p>
      <button onclick="refreshToken()">Renovar Token</button>
      <button onclick="logout()">Cerrar Sesión</button>
      <button onclick="logoutAll()">Cerrar Todas las Sesiones</button>
      <pre id="dashboard-result"></pre>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
