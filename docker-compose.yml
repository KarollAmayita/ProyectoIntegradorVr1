services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cms-multipais
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./backend/.env:/app/.env:ro
